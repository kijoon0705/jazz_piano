<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎹 Mojo Jazz Studio - 숙제 검사 트래커</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#f5f5f7;color:#1d1d1f;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:16px}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#843C34;padding:16px;position:relative;overflow:hidden}
.login-card{background:#fff;border-radius:24px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{text-align:center;font-size:3rem;margin-bottom:8px}
.login-title{text-align:center;font-size:1.15rem;font-weight:800;margin-bottom:4px}
.login-sub{text-align:center;font-size:.8rem;color:#aaa;margin-bottom:28px}
.login-err{background:#fff0f0;border:1px solid #ffc0c0;color:#cc0000;font-size:.82rem;padding:10px 12px;border-radius:8px;margin-bottom:12px;line-height:1.5}
.login-info{background:#f0f5ff;border:1px solid #c0d8ff;color:#0056cc;font-size:.8rem;padding:10px 12px;border-radius:8px;margin-bottom:12px;line-height:1.5}

/* Loading */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:14px}
.spinner{width:36px;height:36px;border:3px solid #f0f0f0;border-top-color:#007aff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:.85rem;color:#aaa}

/* Header */
.header{background:#fff;border-radius:16px;padding:14px 20px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header-left{display:flex;align-items:center;gap:10px;min-width:0}
.header-title{font-size:1.1rem;font-weight:800;white-space:nowrap}
.header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.back-btn{display:inline-flex;align-items:center;background:transparent;border:1px solid transparent;color:#007aff;font-weight:700;font-size:.85rem;cursor:pointer;padding:6px 12px;border-radius:10px;transition:background .2s,border-color .2s;line-height:normal;vertical-align:middle}
.back-btn:hover{background:#f0f5ff;border-color:#d0ddf0}
.breadcrumb-sep{color:#ccc;font-size:.9rem}
.breadcrumb-reg{font-size:.75rem;color:#aaa;font-weight:500;white-space:nowrap}
.breadcrumb-name{font-weight:700;font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.user-name{font-size:.82rem;color:#888;font-weight:600}

/* View toggle */
.view-toggle{display:flex;gap:3px;background:#f0f0f0;padding:3px;border-radius:10px}
.view-toggle .vbtn{padding:5px 12px;font-size:.78rem;font-weight:600;border:none;border-radius:7px;background:transparent;color:#888;cursor:pointer;transition:all .2s}
.view-toggle .vbtn.active{background:#fff;color:#007aff;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* Tab bar */
.tab-bar{display:flex;gap:4px;background:#fff;padding:6px;border-radius:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.tab-btn{flex:1;padding:10px;border:none;border-radius:10px;background:transparent;font-size:.82rem;font-weight:600;color:#888;cursor:pointer;transition:all .2s}
.tab-btn.active{background:#f0f5ff;color:#007aff}

/* Buttons */
.btn{padding:8px 16px;border:none;border-radius:10px;cursor:pointer;font-size:.875rem;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:5px}
.btn-primary{background:#007aff;color:#fff}.btn-primary:hover{background:#0056cc}
.btn-secondary{background:#f0f0f0;color:#333}.btn-secondary:hover{background:#e0e0e0}
.btn-danger{background:#ff3b30;color:#fff}.btn-danger:hover{background:#cc0000}
.btn-ghost{background:none;color:#ff3b30;border:1.5px solid #ff3b30}.btn-ghost:hover{background:#fff0f0}
.btn-sm{padding:5px 10px;font-size:.75rem;border-radius:7px}

/* Card */
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.card-title{font-size:1.05rem;font-weight:700;display:inline-flex;align-items:center;gap:5px}
.card-title>span{display:inline-block;line-height:1}

/* Nav controls */
.nav-controls{display:flex;align-items:center;gap:10px}
.nav-label{font-size:1rem;font-weight:700;min-width:130px;text-align:center}
.nav-btn{background:#f0f0f0;border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:background .2s}
.nav-btn:hover{background:#e0e0e0}

/* Students grid */
.students-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.student-card{background:#fff;border-radius:16px;padding:20px;cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.07);border:2px solid transparent;text-align:left;position:relative}
.student-card:hover{border-color:#007aff;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,122,255,.18)}
.s-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.s-avatar{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800;color:#fff;flex-shrink:0}
.s-name{font-weight:700;font-size:1rem}
.s-info-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;overflow:hidden}
.s-info-row{display:flex;align-items:center;gap:8px;font-size:.78rem;color:#666;min-width:0}
.s-info-row>span:not(.s-icon){overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.s-info-row .s-icon{width:18px;text-align:center;color:#aaa;font-size:.8rem;flex-shrink:0}
.s-bottom{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid #f0f0f0;gap:8px;flex-wrap:nowrap}
.s-card-actions{display:flex;gap:6px;flex-shrink:0}
.add-student-card{border:2px dashed #d0d0d0;background:#fafafa;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:#aaa;transition:all .2s;min-height:200px}
.add-student-card:hover{border-color:#007aff;color:#007aff;background:#f0f5ff}
/* Student list */
.student-list{display:flex;flex-direction:column;gap:8px}
.student-list-header{display:flex;align-items:center;padding:8px 16px;font-size:.75rem;font-weight:600;color:#999;border-bottom:1px solid #eee}
.student-list-row{display:flex;align-items:center;background:#fff;border-radius:12px;padding:12px 16px;cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1.5px solid transparent}
.student-list-row:hover{border-color:#007aff;background:#f8fbff;box-shadow:0 4px 12px rgba(0,122,255,.12)}
.student-list-row.inactive-student{opacity:.55}
.sl-col{display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:.82rem;padding:0 6px;flex:1;min-width:0}
.sl-status{flex:0.7}
.sl-name{flex:0.8;font-weight:700}
.sl-email{flex:1.4;color:#555}
.sl-pw{flex:1;color:#555}
.sl-date{flex:1;color:#888;font-size:.78rem}
.sl-lessons{flex:0.5;color:#555}
.sl-actions{flex:1;display:flex;gap:6px}
.student-list-add{display:flex;align-items:center;justify-content:center;background:#fafafa;border:1.5px dashed #d0d0d0;border-radius:12px;padding:12px 16px;cursor:pointer;color:#aaa;font-size:.85rem;font-weight:600;transition:all .2s;gap:6px}
.student-list-add:hover{border-color:#007aff;color:#007aff;background:#f0f5ff}
.add-icon{font-size:2rem}
.add-label{font-size:.85rem;font-weight:600}
/* Lesson tab */
.lesson-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);border-left:4px solid #007aff;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee;transition:border-color .2s,background .2s;cursor:default}
.lesson-card.expanded{border-color:#f5a623;background:#fffdf5}
.lesson-card.has-memo{cursor:pointer}
.lesson-session-badge{display:inline-flex;align-items:center;background:#f0f0f0;color:#555;border-radius:20px;font-size:.72rem;font-weight:700;padding:3px 12px;white-space:nowrap}
.lesson-time{font-size:.82rem;font-weight:500;color:#555;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.lesson-time-icon{color:#888;font-size:.8rem}
.lesson-status-badge{font-size:.75rem;font-weight:600;color:#007aff;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}
.lesson-icon-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:.95rem;padding:2px 4px;line-height:1;display:flex;align-items:center;transition:color .15s}
.lesson-icon-btn:hover{color:#555}
.lesson-memo-area{margin-top:10px;padding-top:10px;border-top:1px solid #f0e8d0;font-size:.8rem;color:#666;white-space:pre-wrap;line-height:1.7}
.lesson-group{margin-bottom:20px}
.lesson-group-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.lesson-group-badge{background:#007aff;color:#fff;border-radius:20px;font-size:.78rem;font-weight:700;padding:4px 14px;white-space:nowrap;flex-shrink:0}
.lesson-group-line{flex:1;height:1px;background:#e8e8e8}
.lesson-group-count{font-size:.75rem;color:#bbb;font-weight:600;flex-shrink:0}
.session-toggle{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.session-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:.85rem;font-weight:700;color:#888;transition:all .15s}
.session-btn.sel{border-color:#007aff;background:#007aff;color:#fff}
.teacher-tabs{display:flex;gap:0;border-bottom:2px solid #f0f0f0;margin-bottom:16px}
.teacher-tab{padding:10px 20px;border:none;background:none;cursor:pointer;font-size:.9rem;font-weight:600;color:#aaa;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.teacher-tab.active{color:#007aff;border-bottom-color:#007aff}
.enrollment-badge{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:6px}
.enrollment-badge.active{background:#e8f5e9;color:#2e7d32}
.enrollment-badge.inactive{background:#fce4ec;color:#c62828}
.enrollment-filter{display:flex;gap:6px;margin-bottom:14px}
.enrollment-filter button{padding:5px 14px;border-radius:20px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:.8rem;font-weight:600;color:#888;transition:all .15s}
.enrollment-filter button.active-filter{border-color:#007aff;background:#007aff;color:#fff}
.student-card.inactive-student{opacity:.55}

/* Calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.day-lbl{text-align:center;font-size:.72rem;font-weight:700;color:#aaa;padding:6px 2px}
.day-lbl.sun{color:#ff3b30}.day-lbl.sat{color:#007aff}

/* Day cell */
.day-cell{min-height:88px;border-radius:10px;padding:6px 5px;background:#fafafa;border:1.5px solid #f0f0f0;cursor:pointer;transition:background .15s;overflow:hidden}
.day-cell:hover{background:#f0f5ff;border-color:#c0d8ff}
.day-cell.today{border-color:#007aff;background:#f0f5ff}
.day-cell.other-month{opacity:.35}
.day-num{font-size:.78rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:3px}
.day-num.sun{color:#ff3b30}.day-num.sat{color:#007aff}
.today-bubble{background:#007aff;color:#fff;border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem}
.a-tag{font-size:.62rem;padding:2px 5px;border-radius:4px;color:#fff;margin-bottom:2px;display:flex;gap:3px;align-items:center;overflow:hidden}
.a-tag.done{opacity:.65;text-decoration:line-through}
.a-tag-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.a-tag-cnt{font-weight:800;flex-shrink:0}
.more-lbl{font-size:.6rem;color:#aaa;text-align:center}
.dot-row{display:none;gap:3px;flex-wrap:wrap;margin-top:2px}
.dot{width:7px;height:7px;border-radius:50%}

/* Weekly grid */
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week-day{background:#fafafa;border-radius:12px;padding:8px 6px;border:1.5px solid #f0f0f0;min-height:160px}
.week-day.today{border-color:#007aff}
.wday-hdr{text-align:center;margin-bottom:8px}
.wday-name{font-size:.68rem;color:#aaa;font-weight:700}
.wday-name.sun{color:#ff3b30}.wday-name.sat{color:#007aff}
.wday-num{font-size:1rem;font-weight:700}
.wday-num.today-b{background:#007aff;color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:.85rem}
.wday-num.sun-n{color:#ff3b30}.wday-num.sat-n{color:#007aff}
.wtg-wrap{border:1px solid #e8e8e8;border-radius:12px;overflow-y:auto;max-height:620px;background:#fff}
.wtg-header{display:grid;grid-template-columns:52px repeat(7,1fr);border-bottom:1px solid #e8e8e8;background:#fff;position:sticky;top:0;z-index:2}
.wtg-tz{font-size:.58rem;color:#bbb;display:flex;align-items:flex-end;justify-content:center;padding:6px 4px 8px;border-right:1px solid #e8e8e8}
.wtg-hcell{text-align:center;padding:8px 4px 10px;border-left:1px solid #e8e8e8;cursor:pointer}
.wtg-body{display:flex}
.wtg-timecol{width:52px;flex-shrink:0;border-right:1px solid #e8e8e8}
.wtg-timeslot{height:40px;display:flex;align-items:flex-start;padding:3px 6px 0;font-size:.62rem;color:#bbb;border-bottom:1px solid #f4f4f4;box-sizing:border-box}
.wtg-daycols{flex:1;display:grid;grid-template-columns:repeat(7,1fr)}
.wtg-daycol{position:relative;border-left:1px solid #f0f0f0}
.wtg-daycol.wtg-today{background:#f5f8ff}
.wtg-slot{height:40px;border-bottom:1px solid #f4f4f4;box-sizing:border-box}
.wtg-now-line{position:absolute;left:0;right:0;height:2px;background:#ff3b30;z-index:3;pointer-events:none}
.wtg-now-dot{position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:#ff3b30}
.wtg-lesson{position:absolute;left:2px;right:2px;border-radius:6px;padding:2px 7px;background:#eff6ff;color:#1a6fcc;border:1.5px solid #69b3f5;font-size:.72rem;overflow:hidden;box-sizing:border-box;z-index:1;cursor:pointer;line-height:1.3;display:flex;flex-direction:column;justify-content:center;align-items:flex-start}
.pr-item{background:#fff;border-radius:8px;padding:7px;margin-bottom:5px;border-left:4px solid;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.pr-title{font-size:.75rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.pr-song{font-size:.65rem;color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px}
.pr-progress{display:flex;align-items:center;gap:5px}
.pbar-wrap{flex:1;background:#f0f0f0;border-radius:3px;height:5px;overflow:hidden}
.pbar{height:100%;border-radius:3px;transition:width .3s}
.pr-cnt{font-size:.65rem;color:#888;white-space:nowrap}
.wday-empty{font-size:.7rem;color:#ddd;text-align:center;margin-top:8px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:#fff;border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:1.1rem;font-weight:700}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.day-modal-icon-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;transition:all .15s}
.day-modal-icon-btn:hover{background:#f0f0f0;border-color:#ccc;transform:scale(1.08)}

/* Form */
.fg{margin-bottom:14px}
.flabel{display:block;font-size:.82rem;font-weight:600;color:#555;margin-bottom:5px}
.finput{width:100%;padding:9px 12px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:.9rem;transition:border-color .2s;font-family:inherit}
.finput:focus{outline:none;border-color:#007aff}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
.cdot{width:26px;height:26px;border-radius:50%;cursor:pointer;transition:transform .2s;border:3px solid transparent}
.cdot:hover,.cdot.sel{transform:scale(1.25);border-color:#1d1d1f}

/* Log entry */
.log-entry{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fafafa;border-radius:12px;margin-bottom:8px;border-left:4px solid}
.log-info{flex:1;min-width:0}
.log-name{font-weight:700;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-song{font-size:.73rem;color:#aaa;margin-bottom:5px}
.log-pbar{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden;margin-bottom:3px}
.log-pbar-fill{height:100%;border-radius:3px}
.log-target{font-size:.7rem;color:#aaa}
.cnt-ctrl{display:flex;flex-direction:column;align-items:center;gap:6px;flex-shrink:0}
.cnt-btns{display:flex;align-items:center;gap:6px}
.cnt-btn{width:28px;height:28px;border-radius:50%;border:none;background:#007aff;color:#fff;cursor:pointer;font-size:1rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.cnt-btn:hover{background:#0056cc}
.cnt-val{font-size:1.1rem;font-weight:800;min-width:30px;text-align:center}
.chk-btn{width:22px;height:22px;border-radius:6px;border:2px solid #ccc;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.7rem;transition:all .2s}
.chk-btn.on{background:#34c759;border-color:#34c759;color:#fff}

/* Assignment card */
.a-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border-top:1px solid #eee;border-right:1px solid #eee;border-bottom:1px solid #eee;border-left:4px solid #eee;transition:border-color .2s,background .2s;cursor:default}
.a-card.has-memo{cursor:pointer}
.a-card.expanded{border-color:#f5a623;background:#fffdf5}
.a-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.a-name{font-weight:700;font-size:1rem;margin-bottom:6px}
.a-meta{font-size:.78rem;color:#aaa;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.a-meta-val{font-weight:600}
.a-memo-preview{font-size:.78rem;color:#888;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.a-divider{height:1px;background:#f0f0f0;margin:12px 0}
.a-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px}
.a-stat-box{background:#f5f5f7;border-radius:8px;padding:10px 12px}
.a-stat-label{font-size:.68rem;color:#aaa;margin-bottom:4px}
.a-stat-value{font-size:.9rem;font-weight:700;color:#1d1d1f}
.a-memo-full{font-size:.82rem;color:#555;white-space:pre-wrap;line-height:1.7;display:flex;gap:6px}
.a-card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.a-actions{display:flex;gap:10px;flex-shrink:0}

/* Stats */
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}
.stat-card{background:#fafafa;border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:2rem;font-weight:800;color:#007aff;line-height:1}
.stat-lbl{font-size:.75rem;color:#aaa;margin-top:4px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{background:#fafafa;border-radius:12px;padding:14px}

const toStr = d => { const dt=new Date(d); return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`; };

const weekStart = date => { const d=new Date(date); d.setDate(d.getDate()-d.getDay()); return d; };
const fmtDateRange = (start, end) => {
  const fmt = iso => { if(!iso) return ''; const [y,m,d]=iso.split('-'); const dow=DAYS[new Date(Number(y),Number(m)-1,Number(d)).getDay()]; return `${m}.${d}(${dow})`; };
  return `${fmt(start)} ~ ${fmt(end)}`;
};

const errMsg = code => ({
  'auth/user-not-found': '등록된 계정이 없습니다.',

}[code] || '오류가 발생했습니다: ' + code);

// ── Firestore helpers ──
async function fsCreateStudent(name, email, password, registeredAt) {
  let secondary;
  try { secondary = firebase.app('secondary'); }
  catch(e) { secondary = firebase.initializeApp(FIREBASE_CONFIG, 'secondary'); }
  const {user} = await secondary.auth().createUserWithEmailAndPassword(email, password);
  const data = {name, email, password, role: 'student', enrollmentStatus: '수강 중',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()};
  if (registeredAt) data.registeredAt = registeredAt;
  await db.collection('users').doc(user.uid).set(data);
  await secondary.auth().signOut();
}

async function fsUpdateStudentAuth(student, newName, newEmail, newPassword, newRegisteredAt) {
  let secondary;
  try { secondary = firebase.app('secondary'); }
  catch(e) { secondary = firebase.initializeApp(FIREBASE_CONFIG, 'secondary'); }
  const {user} = await secondary.auth().signInWithEmailAndPassword(student.email, student.password);
  if (newEmail && newEmail !== student.email) await user.updateEmail(newEmail);
  if (newPassword && newPassword !== student.password) await user.updatePassword(newPassword);
  await secondary.auth().signOut();
  const update = {name: newName, registeredAt: newRegisteredAt};
  if (newEmail) update.email = newEmail;
  if (newPassword) update.password = newPassword;
  await db.collection('users').doc(student.id).update(update);
}

async function fsSaveAssignment(data, studentId) {
  const {id, ...payload} = data;
  payload.studentId = studentId;
  if (id) { await db.collection('assignments').doc(id).update(payload); }
  else { await db.collection('assignments').add({...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp()}); }
}

async function fsDeleteAssignment(id) {
  await db.collection('assignments').doc(id).delete();
  const snap = await db.collection('practiceLogs').where('assignmentId','==',id).get();
  if (!snap.empty) { const b=db.batch(); snap.docs.forEach(d=>b.delete(d.ref)); await b.commit(); }
}

async function fsSaveLogs(logsToSave) {
  const b = db.batch();
  for (const lg of logsToSave) {
    const snap = await db.collection('practiceLogs')
      .where('studentId','==',lg.studentId)
      .where('assignmentId','==',lg.assignmentId)
      .where('date','==',lg.date).get();
    if (!snap.empty) { b.update(snap.docs[0].ref, lg); }
    else { b.set(db.collection('practiceLogs').doc(), {...lg, createdAt: firebase.firestore.FieldValue.serverTimestamp()}); }
  }
  await b.commit();
}

async function fsDeleteStudent(uid) {
  await db.collection('users').doc(uid).delete();
  const aSnap = await db.collection('assignments').where('studentId','==',uid).get();
  const lSnap = await db.collection('practiceLogs').where('studentId','==',uid).get();
  const lesSnap = await db.collection('lessons').where('studentId','==',uid).get();
  const b = db.batch();
  aSnap.docs.forEach(d=>b.delete(d.ref));
  lSnap.docs.forEach(d=>b.delete(d.ref));
  lesSnap.docs.forEach(d=>b.delete(d.ref));
  await b.commit();
}

async function fsSaveLesson(data, studentId) {
  const {id, ...payload} = data;
  payload.studentId = studentId;
  if (id) { await db.collection('lessons').doc(id).update(payload); }
  else { await db.collection('lessons').add({...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp()}); }
}

async function fsDeleteLesson(id) {
  await db.collection('lessons').doc(id).delete();
}

// ── Hooks ──
function useStudentData(studentId) {
  const [assignments, setAssignments] = useState([]);
  const [logs, setLogs] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!studentId) { setLoading(false); return; }
    setLoading(true);
    const unsubA = db.collection('assignments').where('studentId','==',studentId)
      .onSnapshot(s => { setAssignments(s.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); },
        () => setLoading(false));
    const unsubL = db.collection('practiceLogs').where('studentId','==',studentId)
      .onSnapshot(s => setLogs(s.docs.map(d=>({id:d.id,...d.data()}))));
    return () => { unsubA(); unsubL(); };
  }, [studentId]);
  return {assignments, logs, loading};
}

function useStudents() {
  const [students, setStudents] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    const unsub = db.collection('users').where('role','==','student')
      .onSnapshot(s => { setStudents(s.docs.map(d=>({id:d.id,...d.data()}))); setLoading(false); });
    return unsub;
  }, []);
  return {students, loading};
}

function useLessons(studentId) {
  const [lessons, setLessons] = useState([]);
  useEffect(() => {
    if (!studentId) return;
    const unsub = db.collection('lessons').where('studentId','==',studentId)
      .onSnapshot(s => setLessons(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, [studentId]);
  return lessons;
}

function useAllLessons() {
  const [lessons, setLessons] = useState([]);
  useEffect(() => {
    const unsub = db.collection('lessons')
      .onSnapshot(s => setLessons(s.docs.map(d=>({id:d.id,...d.data()}))));
    return unsub;
  }, []);
  return lessons;
}

// ── Modal wrapper ──
function Modal({title, onClose, children, footer, headerExtra}) {
  React.useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [onClose]);
  return (
    <div className="overlay">
      <div className="modal">
        <div className="modal-hdr">
          <span className="modal-title" style={{flex:1,minWidth:0}}>{title}</span>
          <div style={{display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
            {headerExtra}
            <button className="btn btn-secondary btn-sm" onClick={onClose}>✕</button>
          </div>
        </div>
        {children}
        {footer && <div className="modal-footer">{footer}</div>}
      </div>
    </div>
  );
}

// ── Login Screen ──
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleLogin = async e => {
    e.preventDefault(); setErr(''); setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(email.trim(), pw);
    } catch(ex) { setErr(errMsg(ex.code)); }
    setLoading(false);
  };

  return (

          <img src="./mojologo.jpg" alt="Mojo Jazz Studio" style={{width:100,height:100,borderRadius:'50%',objectFit:'cover',boxShadow:'0 4px 16px rgba(0,0,0,.15)'}}/>
        </div>
        <div className="login-title">Mojo Jazz Studio</div>
        <div className="login-sub">숙제 검사 트래커</div>

        {err && <div className="login-err" style={{whiteSpace:'pre-line'}}>{err}</div>}

        <form onSubmit={handleLogin}>
          <div className="fg">
            <label className="flabel">이메일</label>
            <input className="finput" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="email@example.com" required autoFocus/>
          </div>
          <div className="fg">
            <label className="flabel">비밀번호</label>
            <input className="finput" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required/>
          </div>
          <button className="btn btn-primary" type="submit" disabled={loading}
            style={{width:'100%',justifyContent:'center',padding:'12px'}}>
            {loading ? '처리 중…' : '로그인'}
          </button>
        </form>

        <div style={{textAlign:'center',marginTop:14,fontSize:'.72rem',color:'#bbb'}}>
          학생은 선생님에게 계정을 받아 로그인하세요
        </div>
      </div>
    </div>
  );
}

// ── Add Student Modal ──
function AddStudentModal({onClose}) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [regDate, setRegDate] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const valid = name && email && pw.length >= 6;

  const handle = async () => {
    setErr(''); setLoading(true);
    try { await fsCreateStudent(name, email, pw, regDate||null); onClose(); }
    catch(ex) { setErr(errMsg(ex.code)); }
    setLoading(false);
  };

  return (
    <Modal title="학생 추가" onClose={onClose}
      footer={<><button className="btn btn-secondary" onClick={onClose}>취소</button>
        <button className="btn btn-primary" disabled={!valid||loading} onClick={handle}>
          {loading?'생성 중…':'계정 생성'}
        </button></>}>
      {err && <div className="login-err" style={{marginBottom:12}}>{err}</div>}
      <div className="fg"><label className="flabel">이름 *</label>
        <input className="finput" value={name} onChange={e=>setName(e.target.value)} placeholder="홍길동"/></div>
      <div className="fg"><label className="flabel">이메일 *</label>
        <input className="finput" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="student@example.com"/></div>
      <div className="fg"><label className="flabel">비밀번호 * (6자 이상)</label>
        <input className="finput" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="학생이 사용할 비밀번호"/></div>
      <div className="fg"><label className="flabel">등록일 (선택)</label>
        <input className="finput" type="date" value={regDate} onChange={e=>setRegDate(e.target.value)}/></div>
    </Modal>
  );
}

// ── Password Cell ──

  return (

      <span style={{fontFamily:'monospace',fontSize:'.82rem'}}>{show ? password : '••••••'}</span>
    </div>

// ── Edit Student Modal ──
function EditStudentModal({student, onClose}) {
  const [name, setName] = useState(student.name);
  const [email, setEmail] = useState(student.email || '');
  const [password, setPassword] = useState(student.password || '');
  const [registeredAt, setRegisteredAt] = useState(student.registeredAt || '');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');
  const handle = async () => {
    if (!name || !email || !password) return;
    setErr(''); setLoading(true);
    try {
      await fsUpdateStudentAuth(student, name, email, password, registeredAt);
      onClose();
    } catch(ex) { setErr(errMsg(ex.code)); }
    setLoading(false);
  };
  return (
    <Modal title="학생 정보 수정" onClose={onClose}
      footer={<><button className="btn btn-secondary" onClick={onClose}>취소</button>
        <button className="btn btn-primary" disabled={!name||!email||!password||loading} onClick={handle}>{loading?'저장 중…':'저장'}</button></>}>
      {err && <div className="login-err" style={{marginBottom:12}}>{err}</div>}
      <div className="fg"><label className="flabel">이름</label>
        <input className="finput" value={name} onChange={e=>setName(e.target.value)}/></div>
      <div className="fg"><label className="flabel">이메일</label>
        <input className="finput" type="email" value={email} readOnly style={{background:'#f5f5f5',color:'#999',cursor:'not-allowed'}}/></div>
      <div className="fg"><label className="flabel">비밀번호 (6자 이상)</label>
        <input className="finput" value={password} onChange={e=>setPassword(e.target.value)}/></div>
      <div className="fg"><label className="flabel">최초 등록일</label>
        <input className="finput" type="date" value={registeredAt} onChange={e=>setRegisteredAt(e.target.value)}/></div>
    </Modal>
  );
}

              }} style={{flex:1,padding:'4px 0',fontSize:'.75rem',fontWeight:600,background:'#e8f0fe',color:'#3a7bd5',border:'none',borderRadius:8,cursor:'pointer'}}>+{n}일</button>

        </div>

          <input className="finput" type="date" value={f.endDate} min={f.startDate} onChange={e=>set('endDate',e.target.value)}/></div>
      </div>
      <div className="fg"><label className="flabel">일일 목표 횟수 *</label>

          <button type="button" onClick={()=>set('dailyTarget',Math.max(1,f.dailyTarget-1))} style={{width:34,height:34,borderRadius:8,border:'1.5px solid #e0e0e0',background:'#fafafa',fontSize:'1.1rem',fontWeight:700,cursor:'pointer',flexShrink:0,lineHeight:1}}>−</button>

          {['왼손','오른손','양손'].map(h=>(
            <label key={h} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',borderRadius:10,border:`1.5px solid ${f.hand===h?'#007aff':'#e0e0e0'}`,background:f.hand===h?'#f0f5ff':'#fff',cursor:'pointer',fontSize:'.85rem',fontWeight:f.hand===h?700:400,transition:'all .2s'}}>
              <input type="radio" name="hand" value={h} checked={f.hand===h} onChange={()=>set('hand',h)} style={{accentColor:'#007aff'}}/>

          ))}

// ── Monthly Calendar ──
function MonthCal({year, month, assignments, logs, lessons, onDay}) {
  const ts=todayStr(), first=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate(), dipm=new Date(year,month,0).getDate();
  const cells=[];
  for(let i=first-1;i>=0;i--){const d=dipm-i,m2=month===0?12:month,y2=month===0?year-1:year;cells.push({day:d,ds:`${y2}-${String(m2).padStart(2,'0')}-${String(d).padStart(2,'0')}`,cur:false});}
  for(let d=1;d<=dim;d++)cells.push({day:d,ds:`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,cur:true});
  const rem=42-cells.length;
  for(let d=1;d<=rem;d++){const nm=month+2>12?1:month+2,ny=month+2>12?year+1:year;cells.push({day:d,ds:`${ny}-${String(nm).padStart(2,'0')}-${String(d).padStart(2,'0')}`,cur:false});}
  return (
    <div className="cal-grid">
      {DAYS.map((d,i)=><div key={d} className={`day-lbl${i===0?' sun':i===6?' sat':''}`}>{d}</div>)}
      {cells.map((c,idx)=>{
        const dow=idx%7,isT=c.ds===ts,active=assignments.filter(a=>isActive(a,c.ds));
        const dayLessons=(lessons||[]).filter(l=>l.startAt&&l.startAt.startsWith(c.ds));
        const dayEvents=STUDIO_EVENTS.filter(e=>e.date===c.ds);
        const doneCount=active.filter(a=>getLog(logs,a.id,c.ds)?.completed).length;
        const totalItems=active.length+dayLessons.length+dayEvents.length;
        const shownAssign=active.slice(0,Math.max(0,3-dayLessons.slice(0,1).length));
        return (
          <div key={idx} className={`day-cell${isT?' today':''}${!c.cur?' other-month':''}`} onClick={()=>onDay(c.ds)}>
            <div className={`day-num${dow===0?' sun':dow===6?' sat':''}`}>
              {isT?<span className="today-bubble">{c.day}</span>:c.day}
              {doneCount>0&&active.length>0&&<span style={{fontSize:'.55rem',color:'#34c759',fontWeight:800}}>✓{doneCount}</span>}
            </div>
            {dayEvents.map((ev,i)=>(
              <div key={'ev'+i} className="a-tag" style={{background:'#d64b8a'}}><span className="a-tag-name">{ev.label}</span></div>
            ))}
            {dayLessons.slice(0,1).map(l=>{
              const sT=l.startAt?l.startAt.split('T')[1]:'',eT=l.endAt?l.endAt.split('T')[1]:'';
              const to12=t=>{if(!t)return'';const [h,m]=t.split(':').map(Number);const ap=h<12?'AM':'PM';const h12=h===0?12:h>12?h-12:h;return`${ap} ${h12}:${String(m).padStart(2,'0')}`;};
              const to12short=t=>{if(!t)return'';const [h,m]=t.split(':').map(Number);const h12=h===0?12:h>12?h-12:h;return`${h12}:${String(m).padStart(2,'0')}`;};
              return (
                <div key={l.id} className="a-tag" style={{background:LESSON_COLOR}}>
                  <span className="a-tag-name">{sT&&eT?`${to12(sT)} ~ ${to12short(eT)}`:''} {l.month||1}개월 / {l.session}회차</span>
                </div>
              );
            })}
            {shownAssign.map(a=>{
              const lg=getLog(logs,a.id,c.ds),cnt=lg?.count??0,done=lg?.completed;
              return <div key={a.id} className={`a-tag${done?' done':''}`} style={{background:done?ASSIGN_DONE_COLOR:ASSIGN_COLOR,color:done?'#fff':'#1d1d1f'}}><span className="a-tag-name">{HAND_EMOJI[a.hand]||''} {a.song}</span><span className="a-tag-cnt">{cnt}/{a.dailyTarget}</span></div>;
            })}
            {totalItems>3&&<div className="more-lbl">+{totalItems-3}</div>}

              {dayLessons.slice(0,2).map(l=><div key={l.id} className="dot" style={{background:LESSON_COLOR}}/>)}

        );
      })}

  );

// ── Practice Heatmap ──
function PracticeHeatmap({logs}) {
  const today=new Date();
  const curYear=today.getFullYear();
  const wrapRef=useRef(null);
  const [cs,setCs]=React.useState(11);
  const countMap={};
  logs.forEach(l=>{if(l.date&&l.date.startsWith(String(curYear)))countMap[l.date]=(countMap[l.date]||0)+(l.count||0);});
  const getColor=n=>{if(!n)return'#ebedf0';if(n<=2)return'#c6e48b';if(n<=4)return'#7bc96f';if(n<=7)return'#239a3b';return'#196127';};
  const start=new Date(curYear,0,1);
  start.setDate(start.getDate()-start.getDay());
  const end=new Date(curYear,11,31);
  const weeks=[];
  const cur=new Date(start);
  while(cur<=end){
    const wk=[];
    for(let d=0;d<7;d++){
      const ds=cur.toISOString().split('T')[0];
      const inYear=cur.getFullYear()===curYear;
      wk.push({date:ds,count:inYear?(countMap[ds]||0):null,inYear,month:cur.getMonth()});
      cur.setDate(cur.getDate()+1);
    }
    weeks.push(wk);
  }
  const gap=2,dayLabelW=30;
  useEffect(()=>{
    if(!wrapRef.current)return;
    const calc=()=>{
      const w=wrapRef.current.clientWidth-dayLabelW-gap-28;
      const size=Math.floor((w-(weeks.length-1)*gap)/weeks.length);
      setCs(Math.max(7,size));
    };
    calc();
    const ro=new ResizeObserver(calc);
    ro.observe(wrapRef.current);
    return()=>ro.disconnect();
  },[weeks.length]);
  const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return (
    <div ref={wrapRef} style={{background:'#fafafa',borderRadius:12,padding:'12px 14px',marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:'.85rem',color:'#555',marginBottom:8}}>{curYear}년 연습 기록</div>
      <div style={{display:'flex',gap:gap}}>
        <div style={{display:'flex',flexDirection:'column',gap,paddingTop:18,width:dayLabelW,flexShrink:0}}>
          {['','Mon','','Wed','','Fri',''].map((l,i)=>(
            <div key={i} style={{height:cs,fontSize:9,color:'#999',lineHeight:cs+'px',textAlign:'right',paddingRight:4}}>{l}</div>
          ))}
        </div>
        <div style={{flex:1,overflow:'hidden'}}>
          <div style={{display:'flex',marginBottom:3,height:14}}>
            {weeks.map((wk,wi)=>{
              const first=wk.find(d=>d.inYear);
              if(!first)return <div key={wi} style={{width:cs+gap,flexShrink:0}}/>;
              const dt=new Date(first.date);
              const show=dt.getDate()<=7;
              return <div key={wi} style={{width:cs+gap,flexShrink:0,fontSize:9,color:'#999',overflow:'visible',whiteSpace:'nowrap'}}>{show?MONTHS[dt.getMonth()]:''}</div>;
            })}
          </div>
          <div style={{display:'flex',gap}}>
            {weeks.map((wk,wi)=>(
              <div key={wi} style={{display:'flex',flexDirection:'column',gap}}>
                {wk.map((day,di)=>(
                  <div key={di} title={day.inYear?`${day.date}: ${day.count}회`:''}
                    style={{width:cs,height:cs,borderRadius:2,background:day.inYear?getColor(day.count):'transparent'}}/>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

        <div className="stat-card"><div className="stat-num">{totalDone}</div><div className="stat-lbl">완료 체크</div></div>

const fmtLessonDt = iso => {

  const [y, m, d] = date.split('-');
  const dow = DAYS[new Date(Number(y), Number(m)-1, Number(d)).getDay()];
  return `${y.slice(2)}.${m}.${d}(${dow}) ${time}`;
};

// ── Lesson Modal ──
function LessonModal({lesson, lessons: allLessons, onSave, onClose}) {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const todayISO = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
  const initSplit = dt => dt ? dt.split('T') : [todayISO, ''];
  const [sDate, setSDate] = useState(() => initSplit(lesson?.startAt)[0]);
  const [sTime, setSTime] = useState(() => initSplit(lesson?.startAt)[1]);
  const [eTime, setETime] = useState(() => initSplit(lesson?.endAt)[1]);
  const [month, setMonth] = useState(lesson?.month || 1);
  const [session, setSession] = useState(lesson?.session || 1);
  const [notes, setNotes] = useState(lesson?.notes || '');

  const addMins = mins => {
    if (!sTime) return;
    const [h, m] = sTime.split(':').map(Number);
    const total = h * 60 + m + mins;
    setETime(`${pad(Math.floor(total/60)%24)}:${pad(total%60)}`);
  };

  const continueFromLast = () => {
    const sorted = (allLessons||[]).filter(l=>l.startAt).sort((a,b)=>b.startAt.localeCompare(a.startAt));
    if (sorted.length === 0) return;
    const last = sorted[0];
    setMonth(last.month || 1);
    setSession((last.session || 1) + 1);
  };

  const valid = sDate && sTime && eTime;
  const handle = () => {
    onSave({
      id: lesson?.id,
      startAt: `${sDate}T${sTime}`,
      endAt: `${sDate}T${eTime}`,
      month, session, notes,
    });
  };
  return (
    <Modal title={lesson ? '수업 수정' : '수업 등록'} onClose={onClose}
      footer={<><button className="btn btn-secondary" onClick={onClose}>취소</button>
        <button className="btn btn-primary" disabled={!valid} onClick={handle}>저장</button></>}>
      <div className="frow">
        <div className="fg"><label className="flabel">수업일 *</label>
          <input className="finput" type="date" value={sDate} onChange={e=>setSDate(e.target.value)}/></div>
        <div className="fg"><label className="flabel">시작 시간 *</label>
          <input className="finput" type="time" value={sTime} onChange={e=>setSTime(e.target.value)}/></div>
      </div>
      <div className="fg"><label className="flabel">종료 시간 빠른 설정</label>
        <div style={{display:'flex',gap:6,marginTop:4}}>
          {[15,30,45,60].map(m=>(
            <button key={m} className="btn btn-secondary btn-sm" onClick={()=>addMins(m)} style={{flex:1,justifyContent:'center'}}>+{m}분</button>
          ))}
        </div>
      </div>
      <div className="fg"><label className="flabel">종료 시간 *</label>
        <input className="finput" type="time" value={eTime} onChange={e=>setETime(e.target.value)}/></div>
      <div className="fg"><div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}><label className="flabel" style={{margin:0}}>결제플랜</label><button className="btn btn-secondary btn-sm" onClick={continueFromLast} style={{fontSize:'.72rem',padding:'3px 10px'}}>이어하기</button></div>
        <div className="session-toggle">
          {[1,3,6,12].map(n=>(
            <button key={n} className={`session-btn${month===n?' sel':''}`} onClick={()=>setMonth(n)} style={{width:'auto',borderRadius:20,padding:'6px 16px'}}>{n}달</button>
          ))}
        </div>
      </div>
      <div className="fg"><label className="flabel">회차</label>
        <div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
          <button className="btn btn-secondary btn-sm" onClick={()=>setSession(v=>Math.max(1,v-10))} style={{width:36,height:32,padding:0,justifyContent:'center',fontSize:'.7rem'}}>−10</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setSession(v=>Math.max(1,v-5))} style={{width:36,height:32,padding:0,justifyContent:'center',fontSize:'.7rem'}}>−5</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setSession(v=>Math.max(1,v-1))} style={{width:32,height:32,padding:0,justifyContent:'center'}}>−</button>
          <input type="number" value={session} min={1}
            onChange={e=>{const v=parseInt(e.target.value);if(!isNaN(v)&&v>=1)setSession(v);else if(e.target.value==='')setSession(1);}}
            style={{width:56,textAlign:'center',fontWeight:700,fontSize:'1rem',border:'1.5px solid #e0e0e0',borderRadius:8,padding:'4px 0',outline:'none',MozAppearance:'textfield',WebkitAppearance:'none'}}/>
          <button className="btn btn-secondary btn-sm" onClick={()=>setSession(v=>v+1)} style={{width:32,height:32,padding:0,justifyContent:'center'}}>+</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setSession(v=>v+5)} style={{width:36,height:32,padding:0,justifyContent:'center',fontSize:'.7rem'}}>+5</button>
          <button className="btn btn-secondary btn-sm" onClick={()=>setSession(v=>v+10)} style={{width:36,height:32,padding:0,justifyContent:'center',fontSize:'.7rem'}}>+10</button>
        </div>
      </div>
      <div className="fg"><label className="flabel">메모 ({notes.length}/500)</label>
        <textarea className="finput" value={notes} maxLength={500} onChange={e=>setNotes(e.target.value)}
          rows={4} style={{resize:'vertical',lineHeight:1.6}} placeholder="선택사항"/></div>
    </Modal>
  );
}

// ── Lesson Card ──
function LessonCard({l, isTeacher, onEdit, onDel}) {
  const [expanded, setExpanded] = React.useState(false);
  const hasMemo = !!(l.notes && l.notes.trim());

  const datePart = l.startAt ? l.startAt.split('T')[0] : '';
  const startTime = l.startAt ? l.startAt.split('T')[1] : '';
  const endTime = l.endAt ? l.endAt.split('T')[1] : '';
  let dateStr = '';
  if (datePart) {
    const [y, m, d] = datePart.split('-');
    const dow = DAYS[new Date(Number(y), Number(m)-1, Number(d)).getDay()];
    dateStr = `${y.slice(2)}.${m}.${d}(${dow})`;
  }
  const timeStr = startTime && endTime ? `${startTime} ~ ${endTime}` : startTime;

  return (
    <div
      className={`lesson-card${hasMemo?' has-memo':''}${expanded?' expanded':''}`}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',flex:1,minWidth:0}}>
          <span className="lesson-session-badge">{l.month||1}개월 / {l.session}회차</span>
          {dateStr && <span className="lesson-time"><span className="lesson-time-icon">🗓</span>{dateStr}</span>}
          {timeStr && <span className="lesson-time"><span className="lesson-time-icon">🕐</span>{timeStr}</span>}
          {(l.month||1)*4===l.session && <span style={{background:'#fdf4e7',color:'#8b6914',borderRadius:20,fontSize:'.72rem',fontWeight:600,padding:'4px 12px',whiteSpace:'nowrap',display:'inline-flex',alignItems:'center',gap:4}}>⚠ 수강 만료일</span>}

        <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>

// ── Lessons Panel ──
function LessonsPanel({lessons, isTeacher, onAdd, onEdit, onDel}) {
  if (lessons.length === 0) {
    return (
      <div>
        {isTeacher && (
          <div className="card-header" style={{marginBottom:12}}>
            <span className="card-title"><span>🗓</span><span>수업 목록</span></span>
            <button className="btn btn-primary btn-sm" onClick={onAdd}>+ 수업 등록</button>
          </div>
        )}
        {!isTeacher && <div className="card-header" style={{marginBottom:12}}><span className="card-title"><span>🗓</span><span>수업 목록</span></span></div>}
        <div className="empty"><div className="empty-icon">🎹</div><div className="empty-txt">등록된 수업이 없습니다.</div></div>
      </div>
    );
  }
  // 실제 날짜 기준 월별 그룹핑, 그룹 내 회차 내림차순
  const groups = {};
  lessons.forEach(l => {
    const dateStr = l.startAt ? l.startAt.split('T')[0] : '';
    const key = dateStr ? dateStr.substring(0, 7) : 'unknown'; // YYYY-MM
    if (!groups[key]) groups[key] = [];
    groups[key].push(l);
  });
  const sortedMonths = Object.keys(groups).sort((a,b) => b.localeCompare(a));
  sortedMonths.forEach(m => groups[m].sort((a,b) => b.session - a.session));
  return (
    <div>
      {isTeacher && (
        <div className="card-header" style={{marginBottom:12}}>
          <span className="card-title"><span>🗓</span><span>수업 목록</span></span>
          <button className="btn btn-primary btn-sm" onClick={onAdd}>+ 수업 등록</button>
        </div>
      )}
      {!isTeacher && <div className="card-header" style={{marginBottom:12}}><span className="card-title"><span>🗓</span><span>수업 목록</span></span></div>}
      {sortedMonths.map(m => (
        <div key={m} className="lesson-group">
          <div className="lesson-group-header">
            <span className="lesson-group-badge">{m !== 'unknown' ? `${m.substring(2,4)}년 ${parseInt(m.substring(5,7))}월` : '날짜 없음'}</span>
            <div className="lesson-group-line"/>
            <span className="lesson-group-count">{groups[m].length}회</span>
          </div>
          {groups[m].map(l => <LessonCard key={l.id} l={l} isTeacher={isTeacher} onEdit={onEdit} onDel={onDel}/>)}
        </div>
      ))}
    </div>
  );
}

function AssignmentsPanel({assignments, logs, isTeacher, onAdd, onEdit, onDel}) {
  // 통계탭과 동일한 방식으로 각 숙제의 진행률 계산
  const rateData = {};
  assignments.forEach(a => {
    let tgt = 0, actual = 0, done = 0, active = 0;
    if (a.startDate && a.endDate) {
      for (let d = 1; ; d++) {
        const dt = new Date(a.startDate + 'T12:00:00');
        dt.setDate(dt.getDate() + d - 1);
        const ds = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        if (ds > a.endDate) break;
        if (isActive(a, ds)) {
          active++;
          tgt += a.dailyTarget;
          const lg = getLog(logs||[], a.id, ds);
          if (lg) { actual += lg.count || 0; if (lg.completed) done++; }
        }
      }
    }
    rateData[a.id] = { rate: tgt > 0 ? Math.round(actual / tgt * 100) : 0, actual, tgt, done, active };
  });

  return (
    <div>
      <div className="card-header" style={{marginBottom:12}}>
        <span className="card-title"><span>📝</span><span>숙제 목록</span></span>
        <button className="btn btn-primary btn-sm" onClick={onAdd}>+ 숙제 추가</button>
      </div>
      {assignments.length===0
        ? <div className="empty"><div className="empty-icon">🎵</div><div className="empty-txt">숙제를 추가해 보세요!</div></div>
        : [...assignments].sort((a,b) => (b.startDate||'').localeCompare(a.startDate||'')).map(a => <AssignmentCard key={a.id} a={a} rateData={rateData[a.id]} isTeacher={isTeacher} onEdit={onEdit} onDel={onDel}/>)
      }
    </div>
  );
}

// ── Day Lessons Modal (Teacher) ──
function DayLessonsModal({dateStr, lessons, studentMap, onClose}) {
  const dayLessons = lessons.filter(l=>l.startAt&&l.startAt.startsWith(dateStr)).sort((a,b)=>(a.startAt||'').localeCompare(b.startAt||''));
  const [editing, setEditing] = React.useState({});
  const [saving, setSaving] = React.useState({});
  const [delConf, setDelConf] = React.useState(null);
  const [expanded, setExpanded] = React.useState({});

  const startEdit = l => setEditing(p=>({...p,[l.id]:{sTime:l.startAt?l.startAt.split('T')[1]:'',eTime:l.endAt?l.endAt.split('T')[1]:'',notes:l.notes||''}}));
  const cancelEdit = id => setEditing(p=>{const n={...p};delete n[id];return n;});
  const setField = (id,k,v) => setEditing(p=>({...p,[id]:{...p[id],[k]:v}}));

  const save = async l => {
    const e=editing[l.id]; if(!e) return;
    setSaving(p=>({...p,[l.id]:true}));
    const date=dateStr;
    await db.collection('lessons').doc(l.id).update({startAt:`${date}T${e.sTime}`,endAt:`${date}T${e.eTime}`,notes:e.notes});
    setSaving(p=>({...p,[l.id]:false}));
    cancelEdit(l.id);
  };

  const del = async l => { await fsDeleteLesson(l.id); setDelConf(null); };

  const [y,m,d]=dateStr.split('-');
  const dow=DAYS[new Date(Number(y),Number(m)-1,Number(d)).getDay()];
  const fullDow=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'][new Date(Number(y),Number(m)-1,Number(d)).getDay()];
  const headerTitle = (
    <div>
      <div style={{fontSize:'.78rem',color:'#888',marginBottom:2}}>{y}년 {Number(m)}월</div>
      <div style={{fontSize:'1.3rem',fontWeight:800,color:'#1d1d1f'}}>{Number(d)}일 {fullDow}</div>
    </div>
  );
  const headerRight = dayLessons.length>0 ? <div style={{display:'inline-flex',alignItems:'center',gap:5,background:'#f5f5f7',borderRadius:10,padding:'6px 12px',fontSize:'.8rem',fontWeight:600,color:'#555',whiteSpace:'nowrap'}}>📅 {dayLessons.length}개 수업</div> : null;
  return (
    <Modal title={headerTitle} onClose={onClose} headerExtra={headerRight}>
      {dayLessons.length===0
        ? <p style={{color:'#aaa',fontSize:'.85rem',padding:'24px 0',textAlign:'center'}}>이 날 등록된 수업이 없습니다.</p>
        : dayLessons.map(l=>{
          const st=studentMap[l.studentId];
          const e=editing[l.id];
          const isSaving=saving[l.id];
          const sTime=l.startAt?l.startAt.split('T')[1]:'';
          const eTime=l.endAt?l.endAt.split('T')[1]:'';
          const isExp=!!expanded[l.id];
          const hasMemo=!!(l.notes&&l.notes.trim());
          const isLongMemo=hasMemo&&(l.notes.split('\n').length>1||l.notes.length>30);
          return (
            <div key={l.id} style={{background:'#f8f9fb',borderRadius:12,padding:'14px 16px',marginBottom:10,cursor:e?'default':'pointer'}} onClick={()=>{if(!e&&isLongMemo)setExpanded(p=>({...p,[l.id]:!isExp}));}}>
              {/* 학생 정보 + 아이콘 버튼 */}
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:6,minWidth:0,flexWrap:'wrap'}}>
                  <span style={{fontWeight:700,fontSize:'1rem',whiteSpace:'nowrap'}}>{st?.name||'?'}</span>
                  <span style={{fontSize:'.82rem',color:'#555',whiteSpace:'nowrap'}}>📅 {l.month||1}개월 / {l.session}회차</span>
                  {sTime&&eTime&&(()=>{const to12=t=>{const[h,mm]=t.split(':').map(Number);const ap=h<12?'AM':'PM';const h12=h===0?12:h>12?h-12:h;return`${ap} ${h12}:${String(mm).padStart(2,'0')}`;};const to12s=t=>{const[h,mm]=t.split(':').map(Number);const h12=h===0?12:h>12?h-12:h;return`${h12}:${String(mm).padStart(2,'0')}`;};return <span style={{fontSize:'.82rem',color:'#555',whiteSpace:'nowrap'}}>🕐 {to12(sTime)} ~ {to12s(eTime)}</span>;})()}
                </div>
                {!e&&<div style={{display:'flex',gap:6,flexShrink:0,marginLeft:8}} onClick={ev=>ev.stopPropagation()}>
                  <button className="day-modal-icon-btn" onClick={()=>startEdit(l)}>✏️</button>
                  <button className="day-modal-icon-btn" onClick={()=>setDelConf(l)}>🗑</button>
                </div>}
              </div>
              {e ? (
                <div onClick={ev=>ev.stopPropagation()}>
                  <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:6}}>
                    <input className="finput" type="time" value={e.sTime} onChange={ev=>setField(l.id,'sTime',ev.target.value)} style={{flex:1,minWidth:0}}/>
                    <span style={{color:'#bbb',flexShrink:0,fontWeight:500}}>~</span>
                    <input className="finput" type="time" value={e.eTime} onChange={ev=>setField(l.id,'eTime',ev.target.value)} style={{flex:1,minWidth:0}}/>
                  </div>
                  <div style={{display:'flex',gap:5,marginBottom:8}}>
                    {[15,30,45,60].map(min=>(
                      <button key={min} onClick={()=>{
                        if(!e.sTime) return;
                        const [hh,mm]=e.sTime.split(':').map(Number);
                        const total=hh*60+mm+min;
                        const nh=String(Math.floor(total/60)%24).padStart(2,'0');
                        const nm=String(total%60).padStart(2,'0');
                        setField(l.id,'eTime',`${nh}:${nm}`);
                      }} style={{flex:1,padding:'4px 0',fontSize:'.75rem',fontWeight:600,background:'#e8f0fe',color:'#3a7bd5',border:'none',borderRadius:8,cursor:'pointer'}}>+{min}m</button>
                    ))}
                  </div>
                  <textarea className="finput" rows={5} placeholder="메모" value={e.notes} onChange={ev=>setField(l.id,'notes',ev.target.value)} style={{width:'100%',resize:'vertical',marginBottom:8,fontFamily:'inherit',boxSizing:'border-box'}}/>
                  <div style={{display:'flex',gap:6,justifyContent:'flex-end'}}>
                    <button className="btn btn-secondary btn-sm" onClick={()=>cancelEdit(l.id)}>취소</button>
                    <button className="btn btn-primary btn-sm" disabled={isSaving} onClick={()=>save(l)}>{isSaving?'저장 중…':'저장'}</button>
                  </div>
                </div>
              ) : (
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {hasMemo&&(
                    <div style={{display:'flex',alignItems:'flex-start',gap:6,fontSize:'.83rem',color:'#888',lineHeight:1.5}}>
                      <span style={{width:16,textAlign:'center',flexShrink:0,marginTop:1}}>💬</span>
                      <span style={{whiteSpace:'pre-wrap',flex:1,minWidth:0,overflow:'hidden',display:'-webkit-box',WebkitBoxOrient:'vertical',WebkitLineClamp:isLongMemo&&!isExp?1:'unset'}}>{l.notes}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })
      }
      {delConf&&<ConfirmModal msg={`${studentMap[delConf.studentId]?.name||'?'} 학생의 수업을 삭제할까요?`} onConfirm={()=>del(delConf)} onClose={()=>setDelConf(null)}/>}
    </Modal>
  );
}

// ── Teacher Calendar ──
function TeacherCalendar({students, lessons}) {
  const [view, setView] = useState('monthly');
  const [cur, setCur] = useState(new Date());
  const [dayModal, setDayModal] = React.useState(null);
  const wtgScrollRef = useRef(null);
  useEffect(()=>{
    if(view==='weekly'&&wtgScrollRef.current){
      const now=new Date();
      const scrollTo=Math.max(0,(now.getHours()-1)*60);
      wtgScrollRef.current.scrollTop=scrollTo;
    }
  },[view]);
  const studentMap = Object.fromEntries(students.map(s=>[s.id, s]));
  const ts = todayStr();
  const year = cur.getFullYear(), month = cur.getMonth(), ws = weekStart(cur);
  const prev = () => { const d=new Date(cur); view==='monthly'?d.setMonth(d.getMonth()-1):d.setDate(d.getDate()-7); setCur(d); };
  const next = () => { const d=new Date(cur); view==='monthly'?d.setMonth(d.getMonth()+1):d.setDate(d.getDate()+7); setCur(d); };
  const navLabel = () => { if(view==='monthly') return `${year}년 ${MONTHS[month]}`; const we=new Date(ws); we.setDate(we.getDate()+6); return `${ws.getMonth()+1}/${ws.getDate()} — ${we.getMonth()+1}/${we.getDate()}`; };

  const navBar = (
    <div className="card-header" style={{marginBottom:12}}>
      <div className="nav-controls">
        <button className="nav-btn" onClick={prev}>‹</button>
        <span className="nav-label">{navLabel()}</span>
        <button className="nav-btn" onClick={next}>›</button>
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <div className="view-toggle">
          <button className={`vbtn${view==='monthly'?' active':''}`} onClick={()=>setView('monthly')}>월간</button>
          <button className={`vbtn${view==='weekly'?' active':''}`} onClick={()=>setView('weekly')}>주간</button>
        </div>
        <button className="btn btn-secondary btn-sm" onClick={()=>setCur(new Date())}>오늘</button>
      </div>
    </div>
  );

  let calView;
  if (view === 'monthly') {
    const first=new Date(year,month,1).getDay(), dim=new Date(year,month+1,0).getDate(), dipm=new Date(year,month,0).getDate();
    const cells=[];
    for(let i=first-1;i>=0;i--){const d=dipm-i,m2=month===0?12:month,y2=month===0?year-1:year;cells.push({day:d,ds:`${y2}-${String(m2).padStart(2,'0')}-${String(d).padStart(2,'0')}`,cur:false});}
    for(let d=1;d<=dim;d++)cells.push({day:d,ds:`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`,cur:true});
    const rem=42-cells.length;
    for(let d=1;d<=rem;d++){const nm=month+2>12?1:month+2,ny=month+2>12?year+1:year;cells.push({day:d,ds:`${ny}-${String(nm).padStart(2,'0')}-${String(d).padStart(2,'0')}`,cur:false});}
    calView = (
      <div className="cal-grid">
        {DAYS.map((d,i)=><div key={d} className={`day-lbl${i===0?' sun':i===6?' sat':''}`}>{d}</div>)}
        {cells.map((c,idx)=>{
          const dow=idx%7,isT=c.ds===ts;
          const dayLessons=lessons.filter(l=>l.startAt&&l.startAt.startsWith(c.ds)).sort((a,b)=>(a.startAt||'').localeCompare(b.startAt||''));
          const dayEvents=STUDIO_EVENTS.filter(e=>e.date===c.ds);
          return (
            <div key={idx} className={`day-cell${isT?' today':''}${!c.cur?' other-month':''}`} onClick={()=>setDayModal(c.ds)} style={{cursor:'pointer'}}>
              <div className={`day-num${dow===0?' sun':dow===6?' sat':''}`}>{isT?<span className="today-bubble">{c.day}</span>:c.day}</div>
              {dayEvents.map((ev,i)=>(
                <div key={'ev'+i} className="a-tag" style={{background:'#d64b8a'}}><span className="a-tag-name">{ev.label}</span></div>
              ))}
              {dayLessons.slice(0,3).map(l=>{
                const st=studentMap[l.studentId];
                const sTime=l.startAt?l.startAt.split('T')[1]:'';
                const eTime=l.endAt?l.endAt.split('T')[1]:'';
                const to12=t=>{if(!t)return'';const [h,m]=t.split(':').map(Number);const ap=h<12?'AM':'PM';const h12=h===0?12:h>12?h-12:h;return `${ap} ${h12}:${String(m).padStart(2,'0')}`;};
                const to12short=t=>{if(!t)return'';const [h,m]=t.split(':').map(Number);const h12=h===0?12:h>12?h-12:h;return`${h12}:${String(m).padStart(2,'0')}`;};
                return (
                  <div key={l.id} className="a-tag" style={{background:LESSON_COLOR}}>
                    <span className="a-tag-name">{st?.name||'?'} {sTime&&eTime?`${to12(sTime)} ~ ${to12short(eTime)}`:''}</span>
                  </div>
                );
              })}
              {dayLessons.length>3&&<div className="more-lbl">+{dayLessons.length-3}</div>}
              <div className="dot-row">
                {dayLessons.slice(0,5).map(l=><div key={l.id} className="dot" style={{background:LESSON_COLOR}}/>)}
              </div>
            </div>
          );
        })}
      </div>
    );
  } else {
    const days=Array.from({length:7},(_,i)=>{const d=new Date(ws);d.setDate(d.getDate()+i);return{date:d,ds:toStr(d)};});
    const HOUR_H=40;
    const now=new Date();
    const nowTop=now.getHours()*HOUR_H+(now.getMinutes()/60)*HOUR_H;
    const fmtHour=h=>{if(h===0)return'';if(h<12)return`AM ${h}시`;if(h===12)return'PM 12시';return`PM ${h-12}시`;};
    calView = (
      <div className="wtg-wrap" ref={wtgScrollRef}>
        <div className="wtg-header">
          <div className="wtg-tz">GMT+09</div>
          {days.map(({date,ds},i)=>{
            const isT=ds===ts,dow=date.getDay();
            return (
              <div key={ds} className="wtg-hcell" onClick={()=>setDayModal(ds)}>
                <div className={`wday-name${dow===0?' sun':dow===6?' sat':''}`}>{DAYS[dow]}</div>
                <div className={`wday-num${isT?' today-b':dow===0?' sun-n':dow===6?' sat-n':''}`}>{date.getDate()}</div>
              </div>
            );
          })}
        </div>
        <div className="wtg-body">
          <div className="wtg-timecol">
            {Array.from({length:24},(_,h)=>(
              <div key={h} className="wtg-timeslot">{fmtHour(h)}</div>
            ))}
          </div>
          <div className="wtg-daycols">
            {days.map(({date,ds},i)=>{
              const isT=ds===ts,dow=date.getDay();
              const dayLessons=lessons.filter(l=>l.startAt&&l.startAt.startsWith(ds));
              const dayEvents=STUDIO_EVENTS.filter(e=>e.date===ds);
              return (
                <div key={ds} className={`wtg-daycol${isT?' wtg-today':''}`} style={{height:24*HOUR_H}} onClick={()=>setDayModal(ds)}>
                  {Array.from({length:24},(_,h)=>(
                    <div key={h} className="wtg-slot"/>
                  ))}
                  {isT&&<div className="wtg-now-line" style={{top:nowTop}}><div className="wtg-now-dot"/></div>}
                  {dayEvents.map((ev,ei)=>{
                    const [eh,em]=ev.time.split(':').map(Number);
                    const eTop=eh*HOUR_H+(em/60)*HOUR_H;
                    const eHeight=(24*60-(eh*60+em))/60*HOUR_H;
                    return (
                      <div key={'ev'+ei} className="wtg-lesson" style={{top:eTop,height:Math.max(22,eHeight),background:'#d64b8a',borderColor:'#b33d73'}}>
                        <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{ev.label}</div>
                        {eHeight>=38&&<div style={{fontSize:'.63rem',opacity:.75}}>PM {(()=>{const h12=eh>12?eh-12:eh;return`${h12}:${String(em).padStart(2,'0')}`;})()}~</div>}
                      </div>
                    );
                  })}
                  {dayLessons.map(l=>{
                    const st=studentMap[l.studentId];
                    if(!l.startAt||!l.endAt) return null;
                    const sT=l.startAt.split('T')[1], eT=l.endAt.split('T')[1];
                    const [sh,sm]=sT.split(':').map(Number);
                    const [eh,em]=eT.split(':').map(Number);
                    const top=sh*HOUR_H+(sm/60)*HOUR_H;
                    const height=Math.max(22,((eh*60+em)-(sh*60+sm))/60*HOUR_H);
                    return (
                      <div key={l.id} className="wtg-lesson" style={{top,height}} onClick={e=>{e.stopPropagation();setDayModal(ds);}}>
                        <div style={{fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{st?.name||'?'}, {sT}~{eT}</div>
                        {height>=38&&<div style={{fontSize:'.63rem',opacity:.75,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.month||1}개월 / {l.session}회차</div>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div>
      {navBar}
      {calView}
      {dayModal&&<DayLessonsModal dateStr={dayModal} lessons={lessons} studentMap={studentMap} onClose={()=>setDayModal(null)}/>}
    </div>
  );
}

  useEffect(() => {
    history.replaceState({view:'list'}, '');

    return () => window.removeEventListener('popstate', onPop);
  }, []);

  const selectStudent = s => { history.pushState({view:'student'}, ''); setSelected(s); };
  const goBackToList = () => { history.back(); };

  const deleteStudent = async s => { await fsDeleteStudent(s.id); setDelConfirm(null); if(selected?.id===s.id) goBackToList(); };

    e.stopPropagation();
    const next = (s.enrollmentStatus === '수강 중단') ? '수강 중' : '수강 중단';

        <StudentView studentId={selected.id} isTeacher={true} studentDoc={selected}/>

            <button className={`teacher-tab${mainTab==='students'?' active':''}`} onClick={()=>setMainTab('students')}>👥 학생 목록</button>
          </div>

          {mainTab==='students' && (
            <div className="card">
              <div className="card-header">
                <span className="card-title"><span>👥</span><span>학생 목록</span></span>
                <button className="btn btn-primary btn-sm" onClick={()=>setAddModal(true)}>+ 학생 추가</button>
              </div>
              <div className="enrollment-filter">
                {['전체','수강 중','수강 중단'].map(f=>{
                  const cnt = f==='전체' ? students.length : students.filter(s=>(s.enrollmentStatus||'수강 중')===f).length;
                  return <button key={f} className={enrollFilter===f?'active-filter':''} onClick={()=>setEnrollFilter(f)}>{f} {cnt}</button>;
                })}
              </div>
              {loading
                ? <div className="loading-wrap"><div className="spinner"/></div>
                : <div className="student-list">
                    <div className="student-list-header">
                      <div className="sl-col sl-status">상태</div>
                      <div className="sl-col sl-name">이름</div>
                      <div className="sl-col sl-email">이메일</div>
                      <div className="sl-col sl-pw">비밀번호</div>
                      <div className="sl-col sl-date">등록일</div>
                      <div className="sl-col sl-lessons">수업</div>
                      <div className="sl-col sl-actions"></div>
                    </div>
                    {filteredStudents.map(s=>{
                      const isActive = (s.enrollmentStatus || '수강 중') === '수강 중';
                      const lessonCnt = allLessons.filter(l=>l.studentId===s.id).length;
                      return (

                          <div className="sl-col sl-status"><div className={`enrollment-badge ${isActive?'active':'inactive'}`}>{s.enrollmentStatus||'수강 중'}</div></div>
                          <div className="sl-col sl-name">{s.name}</div>
                          <div className="sl-col sl-email">{s.email}</div>
                          <div className="sl-col sl-pw" onClick={e=>e.stopPropagation()}><PasswordCell password={s.password}/></div>
                          <div className="sl-col sl-date">{s.registeredAt||'—'}</div>
                          <div className="sl-col sl-lessons">{lessonCnt}회</div>
                          <div className="sl-col sl-actions" onClick={e=>e.stopPropagation()}>
                            <button className="btn btn-secondary btn-sm" title={isActive?'수강 중단으로 변경':'수강 중으로 변경'} onClick={e=>toggleEnrollment(e,s)} style={{padding:'3px 7px'}}>{isActive?'⏸':'▶'}</button>
                            <button className="btn btn-secondary btn-sm" onClick={()=>setEditModal(s)} style={{padding:'3px 7px'}}>✏️</button>
                            <button className="btn btn-danger btn-sm" onClick={()=>setDelConfirm(s)} style={{padding:'3px 7px'}}>🗑</button>
                          </div>
                        </div>
                      );
                    })}

                  </div>
              }

          )}

          {mainTab==='calendar' && (
            <div className="card">
              <TeacherCalendar students={students} lessons={allLessons}/>
            </div>
          )}
        </>
      )}

      {addModal&&<AddStudentModal onClose={()=>setAddModal(false)}/>}
      {editModal&&<EditStudentModal student={editModal} onClose={()=>setEditModal(null)}/>}
      {delConfirm&&<ConfirmModal msg={`"${delConfirm.name}" 학생과 모든 데이터를 삭제할까요?`} onConfirm={()=>deleteStudent(delConfirm)} onClose={()=>setDelConfirm(null)}/>}
    </div>
  );
}

// ── Root App ──
function BirthdayModal({onClose}) {
  const canvasRef = React.useRef(null);
  const fireConfetti = () => {
    const canvas = canvasRef.current;
    if (!canvas) { onClose(); return; }
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    canvas.style.display = 'block';
    const colors = ['#ff3b30','#ff9500','#ffcc00','#34c759','#007aff','#af52de','#ff2d55','#5ac8fa'];
    const particles = [];
    for (let i = 0; i < 150; i++) {
      particles.push({
        x: canvas.width / 2 + (Math.random() - 0.5) * 200,
        y: canvas.height / 2,
        vx: (Math.random() - 0.5) * 16,
        vy: Math.random() * -18 - 4,
        w: Math.random() * 8 + 4,
        h: Math.random() * 6 + 2,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * 360,
        rv: (Math.random() - 0.5) * 12,
        gravity: 0.35 + Math.random() * 0.15,
        opacity: 1
      });
    }
    let frame = 0;
    const animate = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        p.x += p.vx;
        p.vy += p.gravity;
        p.y += p.vy;
        p.rot += p.rv;
        if (frame > 40) p.opacity = Math.max(0, p.opacity - 0.02);
        if (p.opacity <= 0) return;
        alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      frame++;
      if (alive && frame < 120) requestAnimationFrame(animate);
      else { canvas.style.display = 'none'; onClose(); }
    };
    animate();
  };
  return (
    <>
      <canvas ref={canvasRef} style={{position:'fixed',inset:0,zIndex:1002,pointerEvents:'none',display:'none'}}/>
      <div className="overlay" style={{zIndex:1001}}>
        <div className="modal" style={{maxWidth:360,textAlign:'center'}}>
          <div style={{fontSize:'2.4rem',marginBottom:12}}>🎂</div>
          <div style={{fontWeight:800,fontSize:'1.05rem',marginBottom:16,lineHeight:1.5,color:'#1d1d1f'}}>
            생일 축하드려요!
          </div>
          <div style={{fontSize:'.92rem',color:'#444',lineHeight:1.8,marginBottom:24,whiteSpace:'pre-line'}}>
            {`해피 조조의 한번뿐인\n2026년도 생일을 축하드립니다 :)\n\n올해에는 더 행복+재미난 일들이 가득해서\n웃는 날이 더 많기를 바라며~\n\nPS. PT는 꼭 성공하길! 🤣🤣`}
          </div>
          <button className="btn btn-primary" onClick={fireConfetti} style={{width:'100%',justifyContent:'center',padding:'11px'}}>생.일.선.물. 🎉</button>
        </div>
      </div>
    </>
  );
}

function App() {
  const [authUser, setAuthUser] = useState(undefined);
  const [userDoc, setUserDoc] = useState(null);
  const [userLoading, setUserLoading] = useState(true);
  const [showBirthday, setShowBirthday] = useState(false);

  useEffect(() => {
    if (!isConfigured) return;
    return auth.onAuthStateChanged(async user => {
      setUserLoading(true);
      setAuthUser(user);
      if (user) {
        const today = new Date();
        if (user.email === 'mojo@naver.com' && today <= new Date('2026-03-31T23:59:59')) {
          setShowBirthday(true);
        }
        try {
          const doc = await db.collection('users').doc(user.uid).get();
          if (doc.exists) {
            setUserDoc({id:doc.id,...doc.data()});
          } else if (isTeacherEmail(user.email)) {
            // 선생님 이메일로 처음 로그인 시 Firestore 문서 자동 생성
            const data = {name:'선생님', email:user.email, role:'teacher', createdAt:firebase.firestore.FieldValue.serverTimestamp()};
            try { await db.collection('users').doc(user.uid).set(data); } catch(e) { console.warn('Firestore write failed:', e); }
            setUserDoc({id:user.uid, ...data});
          } else {
            setUserDoc(null);
          }
        } catch(e) {
          console.error('Firestore read failed:', e);
          if (isTeacherEmail(user.email)) {
            setUserDoc({id:user.uid, name:'선생님', email:user.email, role:'teacher'});
          } else {
            setUserDoc(null);
          }
        }
      } else { setUserDoc(null); }
      setUserLoading(false);
    });
  }, []);

  if (!isConfigured) return <ConfigWarning/>;

  if (authUser === undefined || userLoading) return (
    <div className="login-wrap">
      <div className="loading-wrap"><div className="spinner"/><div className="loading-txt">로딩 중…</div></div>
    </div>
  );

  if (!authUser) return <LoginScreen/>;

  if (!userDoc) return (
    <div className="login-wrap">
      <div className="login-card" style={{textAlign:'center'}}>
        <div style={{fontSize:'2rem',marginBottom:12}}>⚠️</div>
        <div style={{fontWeight:700,marginBottom:8}}>계정 정보가 없습니다</div>
        <div style={{fontSize:'.85rem',color:'#888',marginBottom:20}}>선생님에게 계정 생성을 요청하세요.</div>
        <button className="btn btn-secondary" onClick={()=>auth.signOut()}>로그아웃</button>
      </div>
    </div>
  );

  return (
    <>
      {showBirthday && <BirthdayModal onClose={()=>setShowBirthday(false)}/>}
      {userDoc.role === 'teacher' ? <TeacherApp user={authUser}/> : <StudentApp user={authUser} userDoc={userDoc}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
